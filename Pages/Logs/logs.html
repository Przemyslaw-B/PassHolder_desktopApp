<!-- Szablon -->
<template id="log-row-template"> 
  <div class="log-row log-column-size logs-table-font"> 
    <span id="number-log" class=single-log-data> </span>
    <span id="event-log" class=single-log-data> </span>
    <span id="user-log" class=single-log-data> </span>
    <span id="setted-by-log" class=single-log-data> </span>
    <!-- <span class=single-log-data id="record-log"> </span> -->
    <span id="ip-log" class=single-log-data> </span>
    <!-- <span class=single-log-data id="timestamp-log"> </span> -->
    <div id="single-log-data-time" class="date-space">
      <span id="day-log" class=single-log-data> </span>
      <span id="time-log" class=single-log-data> </span>
    </div>
    <span class=single-log-data id="details-log"> </span>
  </div>
</template>

<div id="logs-page-body">
  <!-- miejsce na filtry -->
  <div id="filters-place">
    <!-- nagłówek -->
    <div id="logs-filter-title">
      <span id="logs-filter-title-text"></span>
    </div>
    <!-- Filtry -->
    <div id="filters-upper" >
      <!--
      <div id="user-filter" class="log-single-filter">
        <span id="userfilter-title" class="log-filter-name">User:</span>
        <select type="text" id="logs-user-select" class="log-filter-input" placeholder="User"></input>
      </div> 
      -->
    </div>

    <div id="filters">
      <div id="type-filter" class="log-single-filter">
        <span id="type-filter-title" class="log-filter-name">Typ:</span>
        <select id="logs-type-selector" class="log-filter-selector active-filter-placeholder">
          <option value="" disabled selected hidden>Wybierz typ</option>
        </select>
        <div id="type-logs-reset-icon" class="log-reset-icon"></div>
      </div>  

      <div id="settedBy-filter" class="log-single-filter">
        <span id="settedBy-title" class="log-filter-name">Administrator:</span>
        <select id="logs-settedBy-selector" class="log-filter-selector active-filter-placeholder">
          <option value="" disabled selected hidden>Wybierz administratora</option>
        </select>
        <div id="settedBy-logs-reset-icon" class="log-reset-icon"></div>
      </div>  

      <div id="ip-filter" class="log-single-filter">
        <span id="ipfilter-title" class="log-filter-name">ip:</span>
        <input type="text" id="logs-ip-input" class="log-filter-input" placeholder="255.255.255.255"></input>
      </div> 

      <div id="dateFrom-log-filter" class="log-single-filter">
        <span id="from-log-title" class="log-filter-name">Od:</label>
        <input type="date" id="dateFrom-log" class="log-date-filter">
      </div>
      <div id="dateTo-log-filter" class="log-single-filter">
        <span id="to-log-title" class="log-filter-name">Do:</label>
        <input type="date" id="dateTo-log" class="log-date-filter"> 
      </div>

    </div>  
  </div>

  <div id="logs-container">
    <!-- Nagłówki tabeli -->
    <div class="single-log-data-headers log-column-size" id="log-titles">
      <span class="title-log" id="titleNumber-log">No.</span>
      <span class="title-log" id="titleEvent-log">Zdarzenie</span>
      <span class="title-log" id="titleUser-log">Dotyczy żytkownika</span>
      <span class="title-log" id="titleSettedBy-log">Wykonał</span>
      <!-- <span class="title-log" id="titleRecord-log">Record</span> -->
      <span class="title-log" id="titleIp-log">IP</span>
      <span class="title-log" id="titleTimestamp-log">data</span>
      <span class="title-log" id="titleDetails-log"></span>
    </div>
    <!-- Główna zawartość listy -->
    <div id="log-list-space">
      <div id="log-list" class="log-list-elements"></div>
    </div>
  </div>

  <!-- Dolny selector stron -->
  <div id="pages-select-space">
    <div id="page-numbers-space">
      
      <div id="prev-page" class="page-icons-format"></div>
      <span id="page-info">1</span>
      <div id="next-page" class="page-icons-format"></div>
    </div>

    <div id="page-row-amount-space">
      <span id="page-selector-title">Pozycje na strone:</span>
      <select id="rows-per-page" class="page-amount-selector">
        <option value="20" selected>20</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>
    </div>

  </div>

</div>
