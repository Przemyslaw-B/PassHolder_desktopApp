<!-- Szablon -->
<template id="log-row-template"> 
  <div class="log-row"> 
    <span class=single-log-data id="number"> </span>
    <span class=single-log-data id="event"> </span>
    <span class=single-log-data id="user"> </span>
    <span class=single-log-data id="setted-by"> </span>
    <span class=single-log-data id="record"> </span>
    <span class=single-log-data id="ip"> </span>
    <span class=single-log-data id="timestamp"> </span>
    <span class=single-log-data id="details"> </span>
  </div>
</template>

<!-- Nagłówki tabeli -->
<div class="single-data" id="titlesClass">
  <span class="title" id="titleNumber">No.</span>
  <span class="title" id="titleEvent">Event</span>
  <span class="title" id="titleUser">User</span>
  <span class="title" id="titleSettedBy">Setted by</span>
  <span class="title" id="titleRecord">Record</span>
  <span class="title" id="titleIp">IP address</span>
  <span class="title" id="titleTimestamp">Timestamp</span>
  <span class="title" id="titleDetails">details</span>
</div>

<!-- Główna zawartość listy -->
<div id="log-list"></div>
