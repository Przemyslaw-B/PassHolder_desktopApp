<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" http-equiv="Content-Security-Policy">
  <title>Logowanie</title>

  <meta http-equiv="Content-Security-Policy" 
  content="default-src 'self'; 
    script-src 'self'; 
    style-src 'self'; 
    connect-src 'self' http://localhost:8081/api/;
    object-src 'none'">

  <link rel="stylesheet" href="login.css">
  <script src="login.js" defer></script>
</head>
<body>
  <div class="language-switch">
    <button id="lang-PL">PL</button>
    <button id="lang-EN">EN</button>
  </div>

  <div class="login-container">
    <h1 id="loginTitle" class="title-class">Log in</h1>
    <input type="text" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginButton">Log in</button>
    <div class="links">
      <a href="#" id="createAccount">Create new account</a>
      <a href="#" id="forgotPassword">Forgotten password?</a>
    </div>
  </div>

  <div class="auth-container">
    <h1 id="authorization-title" class="title-class">Authorization</h1>
    <h2 id="auth-explain">Use the code that was sent to you..</h2>
    <input type="text" id="auth-input" class="formular-row" name="code" maxlength="6"> 
    <button type="button" id="auth-cancel-button" class="default-button">Cancel</button>
    <button type="button" id="auth-confirm-button" class="default-button">Confirm</button>
  </div>

<div class="new-account-container">
  <h1 id="create-account-title" class="title-class">Create account</h1>
  <div class="formular-box">
    <input type="text" id="cratingAcc-email-input" class="formular-row" placeholder="Email">
    <input type="password" id="cratingAcc-passwordinput" class="formular-row" placeholder="Password">
  </div>
  <div class="button-row">
    <button type="button" id="new-account-cancel-button" class="default-button">Cancel</button>
    <button type="button" id="new-account-confirm-button" class="default-button">Confirm</button>
  </div>
</div>

</body>
</html>
