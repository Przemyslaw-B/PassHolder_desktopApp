<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" http-equiv="Content-Security-Policy">
  <title>PassHolder</title>

  <meta http-equiv="Content-Security-Policy" 
  content="
    default-src 'self'; 
    script-src 'self'; 
    style-src 'self';
    img-src 'self' data:; 
    connect-src 'self' http://localhost:8081/api/;
    object-src 'none'">

  <link rel="stylesheet" href="login.css">
  <script src="login.js" defer></script>
</head>

<body>

  <div class="login-container">
    <h1 id="loginTitle" class="title-class">Logowanie</h1>
    <input type="text" id="email" class="formular-row" placeholder="Email" />
    <input type="password" id="password" class="formular-row" placeholder="Hasło" />
    <button id="loginButton">Zaloguj</button>
    <div class="links">
      <a href="#" id="createAccount">Utwórz konto</a>
      <a href="#" id="forgotPassword">Przypomnij hasło</a>
    </div>
  </div>

  <div class="auth-container">
    <h1 id="authorization-title" class="title-class">Autoryzacja</h1>
    <h2 id="auth-explain">Kod weryfikacyjny został wysłany.</h2>
    <input type="text" id="auth-input" class="formular-row" name="code" maxlength="6"> 
    <div class="button-row">
      <button type="button" id="auth-cancel-button" class="default-button">Anuluj</button>
      <button type="button" id="auth-confirm-button" class="default-button">Potwierdź</button>
    </div>
  </div>

<div class="new-account-container">
  <h1 id="create-account-title" class="title-class">Utwórz konto</h1>
  <div class="formular-box">
    <input type="text" id="creatingAcc-email-input" class="formular-row" placeholder="Email">
    <input type="text" id="creatingAcc-name-input" class="formular-row" placeholder="Imie">
    <input type="password" id="creatingAcc-passwordinput" class="formular-row" placeholder="Hasło">
  </div>
  <div class="button-row">
    <button type="button" id="new-account-cancel-button" class="default-button">Anuluj</button>
    <button type="button" id="new-account-confirm-button" class="default-button">Potwierdź</button>
  </div>
</div>

<div id="reset-password-container" class="reset-content-format hidden">
  <div id="reset-password-email-content" class="hidden">
    <div id="reset-password-container-email-describtion">
      <span id="reset-password-email-describtion" class="password-reset-describtion">Podaj email w celu otrzymania tokenu resetowania hasła.</span>
    </div>
    <input type="text" id="reset-password-email-input" class="formular-row" placeholder="Email">
    <div class="reset-password-button-row">
      <button type="button" id="reset-password-email-cancel-button" class="default-button">Anuluj</button>
      <button type="button" id="reset-password-email-confirm-button" class="default-button">Potwierdź</button>
    </div>
  </div>

  <div id="reset-password-restore-token-content" class="reset-content-format hidden">
    <div id="reset-password-container-token-describtion">
      <span id="reset-password-token-describtion" class="password-reset-describtion">Podaj kod resetowania hasła otrzymany na Twój email.</span>
    </div>
    <input type="text" id="token-reset-password-input" class="formular-row" name="code" maxlength="9">
    <div class="reset-password-button-row">
      <button type="button" id="reset-password-token-cancel-button" class="default-button">Anuluj</button>
      <button type="button" id="reset-password-token-confirm-button" class="default-button">Potwierdź</button>
    </div>
  </div>

  <div id="reset-password-enter-new-password-content" class="reset-content-format hidden">
    <div id="reset-password-container-token-describtion">
      <span id="reset-password-new-password-describtion" class="password-reset-describtion">Utwórz nowe hasło użytkownika.</span>
    </div>
    <input type="text" id="new-password-reset-input" class="formular-row" placeholder="podaj hasło">
    <input type="text" id="repeat-password-reset-input" class="formular-row" placeholder="powtórz hasło">
    <div class="reset-password-button-row">
      <button type="button" id="reset-password-new-password-cancel-button" class="default-button">Anuluj</button>
      <button type="button" id="reset-password-new-password-confirm-button" class="default-button">Potwierdź</button>
    </div>
  </div>

  <div id="reset-password-auth-content" class="reset-content-format hidden">
    <div id="reset-password-container-auth-describtion">
      <span id="reset-password-new-password-describtion" class="password-reset-describtion">Podaj kod otrzymany wybraną metodą.</span>
    </div>
    <input type="text" id="auth-reset-password-input" class="formular-row" name="code" maxlength="6">
    <div class="reset-password-button-row">
      <button type="button" id="reset-password-auth-cancel-button" class="default-button">Anuluj</button>
      <button type="button" id="reset-password-auth-confirm-button" class="default-button">Potwierdź</button>
    </div>
  </div>

</div>

<div id="message-container" class="message-container hidden">
  <p id="message" class="notification-message">Message</p>
</div>

<div id="login-version-space">
  <span id="login-version-content"></span>
</div>

</body>
</html>
