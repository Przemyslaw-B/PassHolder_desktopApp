<!-- Główna zawartość -->
  <div class="settings-container">

    <!-- okno potwierdzenia zmiany metody uwierzytelnienia hasłem -->
    <div id="settings-auth-verify-modal" class="hidden">
      <div id="settings-auth-verify-modal-content">
        <div id="settings-auth-verify-modal-content-title-text">
          <span id="settings-auth-verify-modal-title">Potwierdź, że to Ty.</span>
        </div> 
        <div id="settings-auth-verify-modal-content-describtion-text">
          <span id="settings-auth-verify-modal-info">Podaj hasło:</span>
        </div>
        <div id="settings-auth-verify-modal-input-space">
          <input type="password" id="settings-auth-verify-modal-password-input" class="default-input" placeholder="hasło użytkownika">
        </div>
        <div id="settings-auth-verify-modal-buttons-space" class="options-modal-button-space">
          <button id = "settings-auth-verify-modal-cancel-button" class="settings-button">Anuluj</button>
          <button id = "settings-auth-verify-confirm-button" class="settings-button">Potwierdź</button>
        </div>  
        <div id="settings-auth-verify-modal-message-space" class="message-space hidden">
          <span id="settings-auth-verify-modal-message-content" class="message-text"></span>
        </div>
      </div>
    </div>

    <!-- okno potwierdzenia numeru telefonu -->
    <div id="phone-confirm-modal" class="hidden">
      <div id="phone-confirm-modal-content">
        <span id="phone-confirm-modal-info">Podaj kod przesłany na podany numer.</span>
        <div id="phone-confirm-modal-input-space">
          <input type="text" id="phone-confirm-modal-secure-code" class="default-input" placeholder="kod weryfikacyjny">
        </div>
        <div id="phone-confirm-modal-buttons-space">
          <button id = "phone-confirm-modal-cancel-button" class="settings-button">Anuluj</button>
          <button id = "phone-confirm-modal-confirm-button" class="settings-button">Potwierdź</button>
        </div>  
        <span id="phone-confirm-modal-message" class="hidden"></span>
      </div>
    </div>

    <!-- Okno zmiany metody uwierzytelniania -->
    <div id="authMethode-change-modal" class="hidden">
      <div id="authMethode-change-modal-content">
        <div id="authMethode-change-modal-select-space">
          <span id="authMethode-change-modal-span">Wybierz metodę autoryzacji:</span>
          <select id="auth-methode-selector" name="Metoda autoryzacji"></select>
        </div>
        <!-- email -->
        <div id="authMethode-change-modal-email" class="modal-option-content hidden">
          <span id="authMethode-change-modal-email-text" class="modal-option-describtion-span">Podaj kod wysłany na Twój email.</span>
          <div class="auth-option-input-space">
            <input id="authMethode-change-modal-email-input" class="default-input input-auth-methode" placeholder="kod z email">
          </div>
        </div>
        <!-- sms -->
        <div id="authMethode-change-modal-phone" class="modal-option-content hidden">
          <span id="authMethode-change-modal-email-text" class="modal-option-describtion-span">Podaj kod wysłany na numer telefonu.</span>
          <div class="auth-option-input-space">
            <input id="authMethode-change-modal-sms-input" class="default-input input-auth-methode" placeholder="kod z sms">
          </div>
        </div>
        <!-- TOTP -->
        <div id="authMethode-change-modal-TOTP" class="modal-option-content hidden">
          <span id="authMethode-change-modal-email-text" class="modal-option-describtion-span">Podaj kod wyświetlany w aplikacji Authenticator.</span>
          <div id="qrCode-space">
            <div id="qrCode"></div>
          </div>
          <div class="auth-option-input-space">
            <input id="authMethode-change-modal-totp-input" class="default-input input-auth-methode" placeholder="kod z aplikacji">
          </div>
        </div>

        <div id="authMethode-change-modal-buttons-space">
          <button id="authMethode-change-modal-button-cancel" class="settings-button">Anuluj</button>
          <button id="authMethode-change-modal-button-confirm" class="settings-button">Zatwierdź</button>
        </div>

        <div id="authMethode-change-modal-message-space" class="message-space hidden">
          <span id="authMethode-change-modal-message-content" class="message-text"></span>
        </div>

      </div>
    </div>

    <div id="options-space">
      <div id="phone-number-space">
      <span id="settings-phone-number-title">Numer telefonu:</span>
      <span id="settings-phone-number">123456789</span>
      <select id="phone-number-prefix"></select>
      <input type="tel" id="settings-phone-input" placeholder="123 456 789" maxlength="11" autocomplete="tel">
      <button id="settings-add-number" class="settings-button">Zapisz numer</button>
      <button id="settings-edit-number" class="settings-button">Edytuj numer</button>
    </div>  

    <div id="auth-methode-space">
      <label for="auth-methode-label">Metoda uwierzytelniania:</label>
      <span id="selected-auth-methode"></span>
      <div id="change-authMethode-button-space">
        <button id="change-authMethode-button" class="settings-button">Edytuj</button>
      </div>
      <!-- <select id="auth-methode" name="Metoda autoryzacji"></select> -->
    </div>
    

    <div id="logout-space">
      <button id="logout-button" class="settings-button">Wyloguj</button>
    </div>
    </div>
    

  </div>
