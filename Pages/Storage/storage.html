<template id="storage-row-template"> 
  <div class="storage-row"> 
    <span class="single-data" id="number"></span> 
    <span class="single-data" id="idPass" style="display:none;"></span>
    <span class="single-data" id="idCloudPass" style="display:none;"></span> 
    <span class="single-data" id="url"></span> 
    <span class="single-data" id="login"></span> 
    <span class="single-data" id="password"></span> 
    <span class="toggle-eye" id="toggle-eye"></span>
    <div class="single-data" id="exp-date"></div>
    <div class="options-dots" data-id="" id="remove-record"></div>
  </div>
</template>

<div id="storage-header">
  <div id="addRecord-form" class="hidden">

  </div>
  <button id="addRecord-button">✚</button>
</div>
