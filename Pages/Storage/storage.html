    <span class="single-data" id="idCloudPass" style="display:none;"></span> 
    <span class="single-data" id="url"></span> 
    <span class="single-data" id="login"></span>

      <input type="text" id="modify-url">
    </div>
    <div id="modify-login-slot">
      <span id="modify-login-span">Login:</span>
      <input type="text" id="modify-login">
    </div>
    <div id="modify-password-slot">
      <span id="modify-password-span">Password:</span>
      <input type="text" id="modify-password">
    </div>
