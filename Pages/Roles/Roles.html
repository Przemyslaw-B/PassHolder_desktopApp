<!-- Szablon -->
<template id="role-row-template"> 
  <div class="role-row role-column-size"> 
    <span class=single-role-data id="number-role"> </span>
    <span class=single-role-data id="user-role"> </span>
    <span class=single-role-data id="roles-role"> </span>
    <span class=single-role-data id="admin-role"> </span>
    <div id="blank-space-role-data"></div>
    <div id="delete-role-data-icon" class="role-icons-format"></div>
    <div id="edit-role-data-icon" class="role-icons-format"></div>
  </div> 
</template>

<!-- Nagłówki tabeli -->
<div class="single-role-data-headers role-column-size" id="role-titlesClass">
  <span class="title-role" id="titleNumber-role">Num.</span>
  <span class="title-role" id="titleUser-role">Użytkownik</span>
  <span class="title-role" id="titleRoles-role">Rola</span>
  <span class="title-role" id="titleAdmin-role">Nadane przez</span>
  <div></div>
  <div></div>
  <div></div>
</div>

<!-- Główna zawartość listy -->
<div id="role-list" class="role-list-elements"></div>

<!-- okno zatwierdzenia -->
<div id="role-confirmation-modal" class="hidden">
   <input type="text" id="role-confirmation-modal-security-code" class="" placeholder="podaj kod">
   <div class="role-confirmation-modal-button-row">
    <button type="button" id="role-modal-account-cancel-button" class="default-button">Cancel</button>
    <button type="button" id="role-modal-confirm-button" class="default-button">Confirm</button>
  </div>
  <div id="role-confirmation-modal-message-space">
    <span id="role-confirmation-modal-message"></span>
  </div>
</div>

<!-- okno edycji -->
<div id="role-confirmation-modal" class="hidden">
  <div>
    <span id="role-confirmation-modal-select-title">Rola:</span>
    <select id="user-role-change-modal" name="rola"></select>
  </div>

  <div class="role-edit-modal-button-row">
    <button type="button" id="role-edit-modal-cancel-button" class="default-button">Cancel</button>
    <button type="button" id="role-edit-modal-confirm-button" class="default-button">Confirm</button>
  </div>
  <div id="role-edit-modal-message-space">
    <span id="role-edit-modal-message"></span>
  </div>
</div>
